server:
  port: 8081

spring:
  main:
    lazy-initialization: true
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://mysql:3306/ridex
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: ridex-super-secret-key-for-jwt-signing-2024
  expiration: 86400000   # 24h in ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
