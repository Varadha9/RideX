server:
  port: 8082

spring:
  application:
    name: driver-service
  datasource:
    url: jdbc:mysql://localhost:3306/ridex
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  swagger-ui:
    path: /swagger-ui.html
