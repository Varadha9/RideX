services:
  mysql:
    image: mysql:8.0
    container_name: ridex-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ridex
    command: --innodb-buffer-pool-size=128M --performance-schema=OFF
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  postgres:
    image: postgres:15
    container_name: ridex-postgres
    environment:
      POSTGRES_USER: ridex
      POSTGRES_PASSWORD: ridex
      POSTGRES_DB: ridex_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ridex-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: ridex-zookeeper
    mem_limit: 256m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_HEAP_OPTS: "-Xmx128M -Xms64M"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ridex-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms128M"
    mem_limit: 768m
    memswap_limit: 1536m
    restart: on-failure
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ridex-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ridex
      RABBITMQ_DEFAULT_PASS: ridex

  user-service:
    build: ./user-service
    container_name: ridex-user-service
    mem_limit: 384m
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ridex
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  driver-service:
    build: ./driver-service
    container_name: ridex-driver-service
    mem_limit: 384m
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ridex
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis

  booking-service:
    build: ./booking-service
    container_name: ridex-booking-service
    mem_limit: 384m
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ridex
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: redis

  trip-service:
    build: ./trip-service
    container_name: ridex-trip-service
    mem_limit: 384m
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ridex
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  payment-service:
    build: ./payment-service
    container_name: ridex-payment-service
    mem_limit: 384m
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ridex
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  pricing-service:
    build: ./pricing-service
    container_name: ridex-pricing-service
    mem_limit: 384m
    ports:
      - "8086:8086"

  notification-service:
    build: ./notification-service
    container_name: ridex-notification-service
    mem_limit: 384m
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8087:8087"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ridex
      SPRING_RABBITMQ_PASSWORD: ridex

  analytics-service:
    build: ./analytics-service
    container_name: ridex-analytics-service
    mem_limit: 384m
    restart: on-failure
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ridex_analytics
      SPRING_DATASOURCE_USERNAME: ridex
      SPRING_DATASOURCE_PASSWORD: ridex
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

volumes:
  mysql_data:
  postgres_data:
